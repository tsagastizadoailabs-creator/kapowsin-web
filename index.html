const Card = ({ stage, expanded, onToggle }) => {

        border: `1px solid ${isOpen ? stage.color + "55" : palette.border}`,

            color: stage.color,
            lineHeight: 0.85,
            letterSpacing: "-0.04em",
            flexShrink: 0,
            marginTop: -4,

          {stage.step}
        </div>
        <div style={{ flex: 1 }}>

                fontFamily: fontDisplay,
                fontWeight: 400,
                color: palette.text,
                margin: 0,
                letterSpacing: "-0.02em",
                lineHeight: 1,
              }}
            >
              {stage.name}
            </h2>
            <span style={{ fontSize: 13, color: stage.color, fontStyle: "italic", fontFamily: fontDisplay }}>
              {stage.subtitle}

              {stage.cost}
            </div>
          </div>

        <div

            width: 32,
            height: 32,
            borderRadius: "50%",
            border: `1px solid ${stage.color}55`,

            transition: "transform 220ms ease",
            flexShrink: 0,
            marginTop: 4,
          }}

        </div>
      </div>

      {isOpen && (
        <div style={{ paddingTop: 18, borderTop: `1px solid ${palette.border}` }}>
          {stage.pricing && (
            <div style={{ marginBottom: 24 }}>
              <SectionLabel color={stage.color}>Pricing at a glance</SectionLabel>
              <div style={{ display: "grid", gridTemplateColumns: `repeat(${stage.pricing.length}, 1fr)`, gap: 8 }}>
                {stage.pricing.map((p, i) => (

              </div>
            </div>

            <InfrastructureBox color={stage.color} colorSoft={stage.colorSoft} />

          <SectionLabel color={stage.color}>What's available at this step</SectionLabel>
          <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 14, marginBottom: stage.guarantees ? 24 : (stage.note ? 20 : 18) }}>

              <div

              </div>
            ))}
          </div>

          {stage.note && (
            <div
              style={{
                fontSize: 12.5,
                color: palette.textMuted,
                lineHeight: 1.65,
                padding: "12px 16px",
                background: stage.colorSoft,
                borderRadius: 6,
                marginBottom: stage.guarantees ? 20 : 18,

              <strong style={{ color: stage.color, fontWeight: 500 }}>Worth knowing: </strong>
              {stage.note}
            </div>
          )}

          {stage.guarantees && (
            <div style={{ marginBottom: 18 }}>
              <SectionLabel color={stage.color}>What's guaranteed</SectionLabel>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {stage.guarantees.map((g, i) => (
                  <div
                    key={i}
                    style={{
                      fontSize: 12,
                      color: palette.textMuted,
                      display: "flex",

                      lineHeight: 1.55,

                    <span style={{ color: palette.green, marginTop: 1, flexShrink: 0, fontSize: 13 }}>✓</span>
                    <span>{g}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div
            style={{
              fontSize: 12,
              color: palette.textDim,
              fontFamily: fontDisplay,
              fontStyle: "italic",
              padding: "10px 0 0 0",
              borderTop: `1px solid ${palette.border}`,
            }}
          >
            <span style={{ color: stage.color, marginRight: 8 }}>↓</span>
            {stage.next}
          </div>
        </div>
      )}
    </div>
  );
